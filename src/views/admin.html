<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求管理后台 - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 40px 20px;
      color: #fff;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(45deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(45deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .table-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(0, 217, 255, 0.2);
    }

    th {
      padding: 16px;
      text-align: left;
      font-weight: 600;
      color: #00d9ff;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    tbody tr {
      transition: all 0.3s ease;
    }

    tbody tr:hover {
      background: rgba(0, 217, 255, 0.1);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* 状态标签样式 */
    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 6px;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .tag-invalid {
      background: rgba(255, 71, 87, 0.3);
      color: #ff4757;
      border: 1px solid #ff4757;
    }

    .tag-quality-high {
      background: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      border: 1px solid #60a5fa;
    }

    .tag-quality-medium {
      background: rgba(100, 116, 139, 0.3);
      color: #94a3b8;
      border: 1px solid #94a3b8;
    }

    .tag-quality-low {
      background: rgba(148, 163, 184, 0.2);
      color: #64748b;
      border: 1px solid #64748b;
    }

    .tag-difficulty-high {
      background: rgba(168, 85, 247, 0.3);
      color: #c084fc;
      border: 1px solid #c084fc;
    }

    .tag-difficulty-medium {
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      border: 1px solid #a78bfa;
    }

    .tag-difficulty-low {
      background: rgba(129, 140, 248, 0.15);
      color: #818cf8;
      border: 1px solid #818cf8;
    }

    .tag-reviewing {
      background: rgba(251, 191, 36, 0.3);
      color: #fbbf24;
      border: 1px solid #fbbf24;
      animation: pulse 2s ease-in-out infinite;
    }

    /* 执行状态标签 */
    .tag-execution-pending {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tag-execution-in-progress {
      background: rgba(251, 191, 36, 0.3);
      color: #fbbf24;
      border: 1px solid #fbbf24;
      animation: pulse 2s ease-in-out infinite;
    }

    .tag-execution-completed {
      background: rgba(34, 197, 94, 0.3);
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .tags-container {
      margin-bottom: 6px;
    }

    /* 按钮样式 */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn-execute {
      background: linear-gradient(45deg, #00d9ff, #00ff88);
      color: #1a1a2e;
    }

    .btn-execute:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
    }

    .btn-complete {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      color: #fff;
    }

    .btn-complete:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    .btn-view {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-view:hover {
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
    }

    .action-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* 表格单元格样式 */
    .review-cell {
      min-width: 180px;
    }

    .reviewer-cell {
      min-width: 100px;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.8);
    }

    .requirement-cell {
      max-width: 300px;
    }

    .author-cell {
      min-width: 100px;
      white-space: nowrap;
    }

    .tag-pending {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tag-default {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-link {
      text-align: center;
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-link a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .nav-link a:hover {
      color: #00d9ff;
      background: rgba(0, 217, 255, 0.2);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px;
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      border: 1px solid rgba(0, 217, 255, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s ease;
      position: relative;
      max-height: 80vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .modal-close:hover {
      color: #fff;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00d9ff;
      margin-bottom: 20px;
    }

    .modal-field {
      margin-bottom: 20px;
    }

    .modal-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .modal-value {
      color: #fff;
      font-size: 1rem;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #00d9ff;
    }

    /* 审查结果样式 */
    .review-section {
      background: rgba(0, 217, 255, 0.1);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .review-title {
      color: #00d9ff;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .review-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-tag {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .review-tag.invalid {
      background: rgba(255, 71, 87, 0.3);
      color: #ff4757;
    }

    .review-tag.quality-high {
      background: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }

    .review-tag.difficulty-high {
      background: rgba(168, 85, 247, 0.3);
      color: #c084fc;
    }

    .review-reason {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .review-time {
      margin-top: 8px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.6);
    }

    .empty-state .emoji {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }

    /* Toast 通知 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(34, 197, 94, 0.9);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 2000;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: rgba(255, 71, 87, 0.9);
      box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4);
    }

    /* 筛选器 */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      background: rgba(0, 217, 255, 0.2);
      border-color: rgba(0, 217, 255, 0.5);
    }

    .filter-btn.active {
      background: rgba(0, 217, 255, 0.3);
      border-color: #00d9ff;
      color: #00d9ff;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      body {
        padding: 20px 10px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .stats {
        gap: 10px;
      }

      .stat-card {
        padding: 15px 20px;
        flex: 1 1 calc(50% - 10px);
        min-width: 140px;
      }

      .stat-number {
        font-size: 1.8rem;
      }

      .stat-label {
        font-size: 0.8rem;
      }

      .filter-bar {
        gap: 10px;
      }

      .filter-btn {
        padding: 10px 14px;
        font-size: 0.8rem;
        min-width: 44px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* 表格横向滚动 */
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 900px;
      }

      th, td {
        padding: 12px 8px;
        font-size: 0.85rem;
      }

      .btn {
        padding: 8px 12px;
        font-size: 0.8rem;
        min-height: 40px;
        min-width: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .action-cell {
        flex-wrap: wrap;
        gap: 6px;
      }

      .nav-link {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .nav-link a {
        padding: 12px 24px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        padding: 25px 20px;
        max-height: 90vh;
      }

      .modal-title {
        font-size: 1.2rem;
      }

      .modal-close {
        top: 15px;
        right: 15px;
        font-size: 1.3rem;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-field {
        margin-bottom: 15px;
      }

      .modal-label {
        font-size: 0.75rem;
      }

      .modal-value {
        padding: 12px;
        font-size: 0.9rem;
      }

      .review-section {
        padding: 12px;
      }

      .review-title {
        font-size: 0.85rem;
      }

      .review-tag {
        padding: 4px 10px;
        font-size: 0.8rem;
      }

      .empty-state {
        padding: 40px 15px;
      }

      .empty-state .emoji {
        font-size: 3rem;
      }

      .toast {
        left: 20px;
        right: 20px;
        transform: translateX(0) translateY(100px);
        width: auto;
      }

      .toast.show {
        transform: translateX(0) translateY(0);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      .stat-card {
        flex: 1 1 100%;
        padding: 12px 16px;
      }

      .stat-number {
        font-size: 1.5rem;
      }

      .filter-bar {
        flex-wrap: wrap;
      }

      .filter-btn {
        flex: 1 1 calc(50% - 8px);
      }

      table {
        min-width: 850px;
        font-size: 0.8rem;
      }

      th, td {
        padding: 10px 6px;
      }

      .requirement-cell {
        max-width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎛️ 需求管理后台</h1>
    <p class="subtitle">执行和管理所有需求</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">总需求数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-pending">0</div>
        <div class="stat-label">待执行</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-in-progress">0</div>
        <div class="stat-label">执行中</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-completed">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="pending">待执行</button>
      <button class="filter-btn" data-filter="in-progress">执行中</button>
      <button class="filter-btn" data-filter="completed">已完成</button>
    </div>

    <div class="table-container">
      <div id="table-content"></div>
    </div>

    <div class="nav-link">
      <a href="/clawiii">📊 查看需求列表</a>
      <a href="/">← 返回首页</a>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal" id="detailModal" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModalBtn()">&times;</button>
      <h2 class="modal-title">📋 需求详情</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const records = __RECORDS__;
    let currentFilter = 'all';

    // 更新统计数据
    function updateStats() {
      document.getElementById('stat-total').textContent = records.length;
      document.getElementById('stat-pending').textContent = records.filter(r => r.execution_status === 'pending' || !r.execution_status).length;
      document.getElementById('stat-in-progress').textContent = records.filter(r => r.execution_status === 'in_progress').length;
      document.getElementById('stat-completed').textContent = records.filter(r => r.execution_status === 'completed').length;
    }

    // 生成执行状态标签
    function generateExecutionTag(status) {
      if (!status || status === 'pending') {
        return '<span class="tag tag-execution-pending">⏳ 待执行</span>';
      } else if (status === 'in_progress') {
        return '<span class="tag tag-execution-in-progress">🔄 执行中</span>';
      } else if (status === 'completed') {
        return '<span class="tag tag-execution-completed">✅ 已完成</span>';
      }
      return '<span class="tag tag-execution-pending">⏳ 待执行</span>';
    }

    // 生成审查结果 HTML
    function generateReviewResult(record) {
      if (record.reviewed_at === null && record.reviewing_status === 1) {
        return '<span class="tag tag-reviewing">⏳ 审查中</span>';
      }

      if (record.reviewed_at) {
        const parts = [];

        if (record.quality_level === 'high') {
          parts.push('<span class="tag tag-quality-high">⭐ 高质量</span>');
        } else if (record.quality_level === 'medium') {
          parts.push('<span class="tag tag-quality-medium">📝 普通</span>');
        } else if (record.quality_level === 'low') {
          parts.push('<span class="tag tag-quality-low">📄 简单</span>');
        }

        if (record.difficulty_level === 'high') {
          parts.push('<span class="tag tag-difficulty-high">🔥 高难度</span>');
        } else if (record.difficulty_level === 'medium') {
          parts.push('<span class="tag tag-difficulty-medium">⚙️ 中等</span>');
        } else if (record.difficulty_level === 'low') {
          parts.push('<span class="tag tag-difficulty-low">🔹 简单</span>');
        }

        if (record.is_invalid === 1) {
          parts.push('<span class="tag tag-invalid">❌ 无效</span>');
        }

        return parts.length > 0 ? `<div class="tags-container">${parts.join('')}</div>` : '<span class="tag tag-default">已审查</span>';
      }

      return '<span class="tag tag-pending">⏳ 待审查</span>';
    }

    // 生成执行按钮
    function generateActionButton(record) {
      const status = record.execution_status || 'pending';
      if (status === 'in_progress') {
        return `<button class="btn btn-complete" onclick="completeTask(event, ${record.id})">✅ 完成</button>`;
      } else if (status === 'completed') {
        return `<span style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">已归档</span>`;
      } else {
        return `<button class="btn btn-execute" onclick="executeTask(event, ${record.id})">▶️ 执行</button>`;
      }
    }

    // 生成表格内容
    function renderTable() {
      const tableContent = document.getElementById('table-content');
      
      let filteredRecords = records;
      if (currentFilter === 'pending') {
        filteredRecords = records.filter(r => r.execution_status === 'pending' || !r.execution_status);
      } else if (currentFilter === 'in-progress') {
        filteredRecords = records.filter(r => r.execution_status === 'in_progress');
      } else if (currentFilter === 'completed') {
        filteredRecords = records.filter(r => r.execution_status === 'completed');
      }

      if (filteredRecords.length > 0) {
        let rowsHtml = '';
        filteredRecords.forEach((record, index) => {
          const reviewResult = generateReviewResult(record);
          const executionTag = generateExecutionTag(record.execution_status);
          const actionButton = generateActionButton(record);
          const requirementText = (record.requirement_content || '').substring(0, 40);
          const requirementDisplay = requirementText + ((record.requirement_content || '').length > 40 ? '...' : '');

          rowsHtml += `
            <tr>
              <td>${index + 1}</td>
              <td class="author-cell">${escapeHtml(record.author || '匿名')}</td>
              <td class="requirement-cell" onclick="showDetail(${record.id})" style="cursor: pointer;">${escapeHtml(requirementDisplay)}</td>
              <td class="review-cell">${reviewResult}</td>
              <td>${executionTag}</td>
              <td>${record.reviewer || '-'}</td>
              <td>${record.created_at}</td>
              <td class="action-cell">${actionButton}<button class="btn btn-view" onclick="showDetail(${record.id})">📋</button></td>
            </tr>
          `;
        });

        tableContent.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>作者</th>
                <th>需求内容</th>
                <th>审查结果</th>
                <th>执行状态</th>
                <th>审查者</th>
                <th>提交时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        `;
      } else {
        tableContent.innerHTML = `
          <div class="empty-state">
            <span class="emoji">📭</span>
            <p>暂无需求数据</p>
          </div>
        `;
      }
    }

    // 执行任务
    async function executeTask(event, id) {
      event.stopPropagation();
      
      const record = records.find(r => r.id === id);
      if (!record) return;

      try {
        // 复制需求内容和作者信息到剪贴板
        const clipboardText = `作者：${record.author || '匿名'}\n需求：${record.requirement_content || ''}`;
        await navigator.clipboard.writeText(clipboardText);

        // 更新状态为执行中
        const response = await fetch('/api/execution/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, status: 'in_progress' })
        });

        const result = await response.json();
        
        if (result.success) {
          // 更新本地数据
          record.execution_status = 'in_progress';
          renderTable();
          updateStats();
          showToast('✅ 已复制需求信息，状态更新为执行中');
        } else {
          showToast('❌ 更新状态失败：' + result.message, true);
        }
      } catch (error) {
        console.error('执行任务失败:', error);
        showToast('❌ 操作失败：' + error.message, true);
      }
    }

    // 完成任务
    async function completeTask(event, id) {
      event.stopPropagation();

      try {
        const response = await fetch('/api/execution/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, status: 'completed' })
        });

        const result = await response.json();
        
        if (result.success) {
          // 更新本地数据
          const record = records.find(r => r.id === id);
          if (record) {
            record.execution_status = 'completed';
          }
          renderTable();
          updateStats();
          showToast('✅ 需求已标记为已完成');
        } else {
          showToast('❌ 更新状态失败：' + result.message, true);
        }
      } catch (error) {
        console.error('完成任务失败:', error);
        showToast('❌ 操作失败：' + error.message, true);
      }
    }

    // 显示详情
    function showDetail(id) {
      const record = records.find(r => r.id === id);
      if (!record) return;

      const modalBody = document.getElementById('modalBody');

      let reviewHtml = '';
      if (record.reviewed_at || record.is_invalid !== null) {
        const tags = [];
        if (record.is_invalid === 1) {
          tags.push('<span class="review-tag invalid">❌ 无效需求</span>');
        }
        if (record.quality_level === 'high') {
          tags.push('<span class="review-tag quality-high">⭐ 高质量</span>');
        }
        if (record.difficulty_level === 'high') {
          tags.push('<span class="review-tag difficulty-high">🧩 高难度</span>');
        }

        if (tags.length > 0 || record.review_reason) {
          reviewHtml = `
            <div class="review-section">
              <div class="review-title">🤖 AI 审查结果</div>
              <div class="review-tags">${tags.join('')}</div>
              ${record.review_reason ? `<div class="review-reason">📝 ${escapeHtml(record.review_reason)}</div>` : ''}
              ${record.reviewed_at ? `<div class="review-time">⏰ 审查时间：${record.reviewed_at}</div>` : ''}
            </div>
          `;
        }
      }

      let executionHtml = '';
      const status = record.execution_status || 'pending';
      const statusText = status === 'pending' ? '待执行' : status === 'in_progress' ? '执行中' : '已完成';
      executionHtml = `
        <div class="review-section" style="background: rgba(34, 197, 94, 0.1);">
          <div class="review-title" style="color: #22c55e;">🚀 执行状态</div>
          <div style="color: #fff; font-size: 1rem;">${statusText}</div>
        </div>
      `;

      modalBody.innerHTML = `
        <div class="modal-field">
          <div class="modal-label">作者</div>
          <div class="modal-value">${escapeHtml(record.author || '匿名')}</div>
        </div>
        <div class="modal-field">
          <div class="modal-label">完整需求内容</div>
          <div class="modal-value">${escapeHtml(record.content || '')}</div>
        </div>
        <div class="modal-field">
          <div class="modal-label">需求描述</div>
          <div class="modal-value">${escapeHtml(record.requirement_content || '')}</div>
        </div>
        <div class="modal-field">
          <div class="modal-label">IP 地址</div>
          <div class="modal-value">${escapeHtml(record.ip_address || '')}</div>
        </div>
        <div class="modal-field">
          <div class="modal-label">提交时间</div>
          <div class="modal-value">${record.created_at}</div>
        </div>
        ${executionHtml}
        ${reviewHtml}
      `;

      document.getElementById('detailModal').classList.add('show');
    }

    function closeModal(event) {
      if (event.target === document.getElementById('detailModal')) {
        document.getElementById('detailModal').classList.remove('show');
      }
    }

    function closeModalBtn() {
      document.getElementById('detailModal').classList.remove('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Toast 通知
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // 筛选器
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('detailModal').classList.remove('show');
      }
    });

    // 初始化
    updateStats();
    renderTable();
  </script>
</body>
</html>
